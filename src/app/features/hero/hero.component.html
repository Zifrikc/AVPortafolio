<div class="hero-container">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="profile-img-container">
        <img class="profile-img" src="https://res.cloudinary.com/tecnologi-zifrikc/image/upload/v1751728192/avatar2_oicuzt.png" alt="Ashley Zifrikc V.T." />
      </div>
      <div class="hero-text">
        <h1>Ashley Zifrikc V.T.</h1>
        <p class="p-style">Desarrollador web profesional.</p> 
        <p>Transformo ideas en experiencias digitales.</p>
        <p>Mi objetivo es diseñar y construir aplicaciones web innovadoras que conecten, inspiren y generen impacto.</p>
        
        <div class="hero-buttons">
          <button class="btnModels" mat-raised-button routerLink="/projects">Ver Proyectos</button>
          <button class="btnModels" mat-raised-button data-bs-toggle="modal" data-bs-target="#certificatesModal">Ver Certificados</button>
        </div>

        <elevenlabs-convai agent-id="agent_4901k5w52pbjesatdx69v81q9f7t"></elevenlabs-convai>
        <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
      </div>
    </div>
  </div>

<!-- Certificados Modal -->
<div class="modal fade" id="certificatesModal" tabindex="-1" aria-labelledby="certificatesModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content certificates-modal">
      <div class="modal-header certificates-modal-header">
        <h5 class="modal-title" id="certificatesModalLabel">Mis Certificados</h5>
        <button type="button" class="btn-close-custom-x" data-bs-dismiss="modal" aria-label="Close">✕</button>
      </div>
      <div class="modal-body certificates-modal-body">
        <div class="container-fluid">
          <div class="certificates-grid">
            <div class="certificate-card" *ngFor="let cert of certificates">
              <div class="certificate-inner">
                <img [src]="cert.image" class="certificate-image" [alt]="cert.title">
                <div class="certificate-info">
                  <div class="certificate-badge">✓</div>
                  <h6 class="certificate-title">{{ cert.title }}</h6>
                  <p class="certificate-issuer">{{ cert.issuer }}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
