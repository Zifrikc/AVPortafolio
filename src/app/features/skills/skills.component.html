<div class="skills-container">
  <h2>Habilidades Técnicas</h2>
  <div class="slider">
    <div class="slide-track">
      <div class="slide" *ngFor="let skill of skills">
        <img [src]="skill.logo" [alt]="skill.name">
      </div>
      <!-- Repeat the slides for a seamless loop -->
      <div class="slide" *ngFor="let skill of skills">
        <img [src]="skill.logo" [alt]="skill.name">
      </div>
    </div>
  </div>
</div>
