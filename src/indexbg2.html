<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Disparos en la Galaxia</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            cursor: none;
        }
        canvas {
            display: block;
        }
        .info-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 10;
        }
        .info-overlay h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .info-overlay p {
            font-size: 1.2em;
            margin: 5px 0;
        }
        .info-overlay button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.5em;
            background-color: #0d0d0d;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px #00f0ff;
            transition: all 0.3s ease;
        }
        .info-overlay button:hover {
            background-color: #00f0ff;
            color: #0d0d0d;
        }
    </style>
</head>
<body>
    <div id="start-screen" class="info-overlay">
        <h1>GALAXY SHOOTER</h1>
        <p>Mueve el mouse para pilotar la nave.</p>
        <p>Haz clic para disparar.</p>
        <button id="start-button">Iniciar Juego</button>
    </div>
    <div id="game-over-screen" class="info-overlay" style="display: none;">
        <h1>GAME OVER</h1>
        <p>Puntuación Final: <span id="final-score">0</span></p>
        <button id="restart-button">Jugar de Nuevo</button>
    </div>
    <canvas id="game-canvas"></canvas>

    <!-- Tone.js para efectos de sonido -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <script>
        // --- CONFIGURACIÓN INICIAL ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let stars = [];
        let bullets = [];
        let enemies = [];
        let enemySpawnTimer = 0;
        let player;

        // --- SONIDOS ---
        const synth = new Tone.Synth().toDestination();
        const metalSynth = new Tone.MetalSynth({
            frequency: 50,
            envelope: { attack: 0.001, decay: 0.1, release: 0.01 },
            harmonicity: 3.1,
            modulationIndex: 16,
            resonance: 4000,
            octaves: 1.5
        }).toDestination();

        function playShootSound() {
            synth.triggerAttackRelease("C5", "8n");
        }

        function playExplosionSound() {
            metalSynth.triggerAttackRelease("C2", "0.2");
        }
        function playPlayerHitSound() {
            synth.triggerAttackRelease("G2", "0.2");
        }


        // --- CLASES DEL JUEGO ---

        // La estela de energía (versión adaptada de la criatura)
        class Propulsion {
            constructor(x, y, tentacleCount) {
                this.pos = { x: x, y: y };
                this.vel = { x: 0, y: 0 };
                this.target = { x: x, y: y };
                this.radius = 10;
                this.tentacles = [];
                this.time = 0;
                for (let i = 0; i < tentacleCount; i++) {
                    const hue = 180 + Math.random() * 60;
                    const segmentCount = 15 + Math.floor(Math.random() * 20);
                    const segmentLength = 1 + Math.random() * 2;
                    const tentacle = new Tentacle(x, y, segmentCount, segmentLength, hue);
                    tentacle.angleOffset = (i / tentacleCount) * Math.PI * 2;
                    this.tentacles.push(tentacle);
                }
            }
            update(targetX, targetY) {
                this.target.x = targetX;
                this.target.y = targetY;
                this.time += 0.05;
                const dx = this.target.x - this.pos.x;
                const dy = this.target.y - this.pos.y;
                this.pos.x += dx * 0.2;
                this.pos.y += dy * 0.2;
                const pulse = Math.sin(this.time * 2) * this.radius * 0.4;
                this.tentacles.forEach(t => {
                    const jitter = Math.sin(this.time * t.jitterSpeed + t.angleOffset) * t.jitterAmount;
                    const currentRadius = this.radius + pulse + jitter;
                    const anchorX = this.pos.x + Math.cos(t.angleOffset) * currentRadius;
                    const anchorY = this.pos.y + Math.sin(t.angleOffset) * currentRadius;
                    t.move(anchorX, anchorY);
                });
            }
            draw() {
                this.tentacles.forEach(t => t.draw());
            }
        }

        class Tentacle {
            constructor(x, y, segmentCount, segmentLength, hue) {
                this.pos = { x: x, y: y };
                this.segments = [new Segment(this, segmentLength)];
                this.segmentLength = segmentLength;
                this.hue = hue;
                this.angleOffset = 0;
                this.jitterSpeed = Math.random() * 0.1 + 0.02;
                this.jitterAmount = Math.random() * 2 + 0.5;
                for (let i = 1; i < segmentCount; i++) {
                    this.segments.push(new Segment(this.segments[i - 1], this.segmentLength));
                }
            }
            move(targetX, targetY) {
                this.pos.x = targetX;
                this.pos.y = targetY;
                this.segments.forEach(segment => segment.update());
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.pos.x, this.pos.y);
                ctx.strokeStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.lineWidth = 1;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.shadowBlur = 10;
                this.segments.forEach((s, i) => {
                    ctx.lineWidth = 1 * (1 - i / this.segments.length);
                    ctx.lineTo(s.pos.x, s.pos.y);
                });
                ctx.stroke();
            }
        }

        class Segment {
            constructor(parent, length) {
                this.parent = parent;
                this.length = length;
                this.pos = { x: 0, y: 0 };
            }
            update() {
                const dx = this.parent.pos.x - this.pos.x;
                const dy = this.parent.pos.y - this.pos.y;
                const angle = Math.atan2(dy, dx);
                this.pos.x = this.parent.pos.x - Math.cos(angle) * this.length;
                this.pos.y = this.parent.pos.y - Math.sin(angle) * this.length;
            }
        }

        // Nave del jugador
        class Player {
            constructor() {
                this.pos = { x: window.innerWidth / 2, y: window.innerHeight / 1.2 };
                this.propulsion = new Propulsion(this.pos.x, this.pos.y + 10, 50);
                this.size = 15;
                this.canBeHit = true;
                this.invincibilityTimer = 0;
            }
            update() {
                // Movimiento suave hacia el mouse
                const dx = mouse.x - this.pos.x;
                const dy = mouse.y - this.pos.y;
                this.pos.x += dx * 0.1;
                this.pos.y += dy * 0.1;

                this.propulsion.update(this.pos.x, this.pos.y + 10);
                
                if (this.invincibilityTimer > 0) {
                    this.invincibilityTimer--;
                    if (this.invincibilityTimer <= 0) {
                        this.canBeHit = true;
                    }
                }
            }
            draw() {
                this.propulsion.draw();
                
                // Efecto de parpadeo si es invencible
                if (this.invincibilityTimer > 0 && Math.floor(this.invincibilityTimer / 5) % 2 === 0) {
                    return;
                }

                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size, this.size);
                ctx.lineTo(-this.size, this.size);
                ctx.closePath();
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = "#ffffff";
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.restore();
            }
            shoot() {
                bullets.push(new Bullet(this.pos.x, this.pos.y - this.size));
                playShootSound();
            }
            hit() {
                if (this.canBeHit) {
                    lives--;
                    this.canBeHit = false;
                    this.invincibilityTimer = 120; // 2 segundos de invencibilidad
                    playPlayerHitSound();
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }
        }

        class Bullet {
            constructor(x, y) {
                this.pos = { x: x, y: y };
                this.size = 4;
                this.speed = 10;
            }
            update() {
                this.pos.y -= this.speed;
            }
            draw() {
                ctx.fillStyle = "#00f0ff";
                ctx.shadowColor = "#00f0ff";
                ctx.shadowBlur = 15;
                ctx.fillRect(this.pos.x - this.size / 2, this.pos.y, this.size, this.size * 3);
            }
        }

        class Enemy {
            constructor() {
                this.size = 15 + Math.random() * 20;
                this.pos = {
                    x: Math.random() * canvas.width,
                    y: -this.size
                };
                this.speed = 1 + Math.random() * 2;
            }
            update() {
                this.pos.y += this.speed;
            }
            draw() {
                ctx.fillStyle = "#ff4136";
                ctx.shadowColor = "#ff4136";
                ctx.shadowBlur = 10;
                ctx.fillRect(this.pos.x - this.size / 2, this.pos.y - this.size / 2, this.size, this.size);
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // --- FUNCIONES DEL JUEGO ---
        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            score = 0;
            lives = 3;
            stars = [];
            bullets = [];
            enemies = [];
            
            player = new Player();
            for (let i = 0; i < 200; i++) {
                stars.push(new Star());
            }
        }
        
        function startGame() {
            setup();
            gameRunning = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            Tone.start(); // El audio debe iniciarse con una interacción del usuario
            animate();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function checkCollisions() {
            // Balas con enemigos
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const b = bullets[i];
                    const e = enemies[j];
                    const dist = Math.hypot(b.pos.x - e.pos.x, b.pos.y - e.pos.y);
                    if (dist < e.size) {
                        playExplosionSound();
                        enemies.splice(j, 1);
                        bullets.splice(i, 1);
                        score += 100;
                        break; // La bala solo puede chocar con un enemigo
                    }
                }
            }

            // Jugador con enemigos
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dist = Math.hypot(player.pos.x - e.pos.x, player.pos.y - e.pos.y);
                if (dist < player.size + e.size / 2) {
                     player.hit();
                     enemies.splice(i, 1);
                }
            }
        }

        function drawUI() {
            ctx.save();
            ctx.shadowColor = "transparent";
            ctx.font = "24px 'Courier New', Courier, monospace";
            ctx.fillStyle = "white";
            ctx.textAlign = "left";
            ctx.fillText("Score: " + score, 20, 40);
            ctx.textAlign = "right";
            ctx.fillText("Lives: " + lives, canvas.width - 20, 40);
            ctx.restore();
        }

        // --- BUCLE PRINCIPAL ---
        function animate() {
            if (!gameRunning) return;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(s => { s.update(); s.draw(); });
            
            player.update();
            player.draw();

            bullets.forEach((b, index) => {
                b.update();
                b.draw();
                if (b.pos.y < 0) bullets.splice(index, 1);
            });

            enemySpawnTimer++;
            if (enemySpawnTimer > 100) { // Genera un enemigo cada 100 frames
                enemies.push(new Enemy());
                enemySpawnTimer = 0;
            }

            enemies.forEach((e, index) => {
                e.update();
                e.draw();
                if (e.pos.y > canvas.height + e.size) enemies.splice(index, 1);
            });

            checkCollisions();
            drawUI();

            requestAnimationFrame(animate);
        }

        // --- MANEJADORES DE EVENTOS ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('click', () => {
            if (gameRunning) {
                player.shoot();
            }
        });
        
        window.addEventListener('resize', () => {
            if (!gameRunning) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        document.getElementById('start-button').addEventListener('click', startGame);
        document.getElementById('restart-button').addEventListener('click', startGame);

        // --- INICIO ---
        setup(); // Configuración inicial para mostrar el fondo
        stars.forEach(s => { s.update(); s.draw(); }); // Dibujar estrellas iniciales

    </script>
</body>
</html>
